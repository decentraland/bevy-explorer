syntax = "proto3";
package decentraland.common;

message Color3 {
  float r = 1;
  float g = 2;
  float b = 3;
}

message Color4 {
  float r = 1;
  float g = 2;
  float b = 3;
  float a = 4;
}

// A range of Color4 values. Randomized or lerped between start and end.
message ColorRange {
  Color4 start = 1;
  Color4 end = 2;
}