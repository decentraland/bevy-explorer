on:
  push:
    branches:
      - main
  pull_request:

# PRs share a per-ref group so a superseded push cancels the in-flight run. Main
# pushes get a unique group each (run_id): sharing one made every main run queue
# behind the previous run's whole test matrix, delaying deploy starts by up to an
# hour. Only the deploy job serializes, via its job-level group.
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}-${{ github.event_name == 'pull_request' && 'pr' || github.run_id }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

name: Continuous integration

jobs:
  # No separate `cargo check` job: clippy compiles everything check does, plus lints.

  # Did this change touch the rust dependency graph? The expensive jobs below scale
  # their coverage on this. On pull_request the filter reads the PR file list from
  # the API; on push it diffs against the pre-push commit (hence the checkout).
  changes:
    name: Changes
    runs-on: ubuntu-latest
    outputs:
      rust-deps: ${{ steps.filter.outputs.rust-deps }}
    steps:
      - uses: actions/checkout@v6
      - uses: dorny/paths-filter@de90cc6fb38fc0963ad72b210f1f284cd68cea36 # v3.0.2
        id: filter
        with:
          filters: |
            rust-deps:
              - 'Cargo.lock'
              - 'Cargo.toml'
              - '**/Cargo.toml'
              - '.cargo/config.toml'

  hardcore-test:
    name: Test Scenes
    needs: changes
    # Runs only when the rust dep files change, and never for dependabot: its bumps
    # are validated by the merge push to main, where the actor is the human merger.
    if: ${{ needs.changes.outputs.rust-deps == 'true' && github.actor != 'dependabot[bot]' }}
    runs-on: ubuntu-22.04
    # Main runs no longer share a workflow group, so coalescing moves here: a
    # newer push cancels this job's superseded in-flight run.
    concurrency:
      group: ${{ github.workflow }}-scenes-${{ github.ref }}
      cancel-in-progress: true
    steps:
      # Checkout must precede rust-cache: the cache key hashes Cargo.lock, and
      # without it the key is constant — saved once from main, then frozen stale.
      - uses: actions/checkout@v6
      - uses: actions-rs/toolchain@v1
        with:
          profile: minimal
          toolchain: stable
          override: true
      - uses: Swatinem/rust-cache@v2
        with:
          save-if: ${{ github.ref == 'refs/heads/main' }}
      - name: Install protoc
        uses: arduino/setup-protoc@3ea1d70ac22caff0b66ed6cb37d5b7aadebd4623 # @master
        with:
          repo-token: ${{ secrets.GITHUB_TOKEN }}
      - name: Install alsa, udev and xkb
        run: sudo apt-get update; sudo apt-get install --no-install-recommends libasound2-dev libudev-dev libxkbcommon-x11-0 ninja-build
      # react-hud-cef (default feature) links libcef; export the distribution for build + runtime
      # (the HUD itself is skipped in test mode, but the dynamic linker still needs the library)
      - name: Export CEF distribution
        run: |
          cargo install export-cef-dir --version "139.8.0+139.0.40"
          export-cef-dir --force "$HOME/.local/share/cef"
          echo "CEF_PATH=$HOME/.local/share/cef" >> "$GITHUB_ENV"
          echo "LD_LIBRARY_PATH=$HOME/.local/share/cef:$LD_LIBRARY_PATH" >> "$GITHUB_ENV"
      - name: install xvfb, llvmpipe and lavapipe
        run: |
          sudo apt-get update -y -qq
          sudo add-apt-repository ppa:kisak/kisak-mesa -y
          sudo apt-get update
          sudo apt install -y xvfb libegl1-mesa libgl1-mesa-dri libxcb-xfixes0-dev mesa-vulkan-drivers
      - name: install ffmpeg deps
        run: sudo apt install -y --no-install-recommends clang curl pkg-config libavcodec-dev libavformat-dev libavutil-dev libavfilter-dev libavdevice-dev
      - name: install livekit deps
        run: sudo apt update -y; sudo apt install -y libssl-dev libx11-dev libgl1-mesa-dev libxext-dev
      - name: Test Scenes
        continue-on-error: true
        run: |
          xvfb-run -s "-screen 0 320x240x24" cargo run --release --locked -- --server https://decentraland.github.io/scene-explorer-tests/scene-explorer-tests --test_scenes "52,-52;52,-54;52,-56;52,-58;52,-60;52,-62;52,-64;52,-66;52,-68;54,-52;54,-54;54,-56;54,-58;54,-60" --no_fog --distance 1 --scene_log_to_console

  test:
    name: Test Suite
    needs: changes
    # Ubuntu always runs as the cheap unit-test leg. The 10x-macOS/2x-Windows legs
    # only run when the rust dep files change — their main value is catching
    # platform-specific dependency breakage. Dependabot cargo bumps get the ubuntu
    # leg here plus the full matrix post-merge (main push: human actor + lock diff);
    # its npm/actions bumps skip the job entirely (they can't affect the rust build).
    if: ${{ needs.changes.outputs.rust-deps == 'true' || github.actor != 'dependabot[bot]' }}
    strategy:
      fail-fast: false
      matrix:
        os: ${{ (needs.changes.outputs.rust-deps == 'true' && github.actor != 'dependabot[bot]') && fromJSON('["windows-latest", "ubuntu-latest", "macos-15"]') || fromJSON('["ubuntu-latest"]') }}
    runs-on: ${{ matrix.os }}
    # Same coalescing as Test Scenes, per matrix leg — without this, every push
    # in a burst of main merges would bill the full 10x-macOS/2x-Windows matrix.
    concurrency:
      group: ${{ github.workflow }}-test-${{ matrix.os }}-${{ github.ref }}
      cancel-in-progress: true
    steps:
      - uses: actions/checkout@v6
      - uses: actions-rs/toolchain@v1
        with:
          profile: minimal
          toolchain: stable
          override: true
#      - uses: Swatinem/rust-cache@v2
      - name: Install protoc
        if: matrix.os != 'self-hosted-windows'
        uses: arduino/setup-protoc@3ea1d70ac22caff0b66ed6cb37d5b7aadebd4623 # @master
        with:
          repo-token: ${{ secrets.GITHUB_TOKEN }}
      - name: Install alsa and udev
        run: sudo apt-get update; sudo apt-get install --no-install-recommends libasound2-dev libudev-dev ninja-build
        if: runner.os == 'linux'
      - name: install ffmpeg deps (linux)
        run: sudo apt install -y --no-install-recommends clang curl pkg-config libavcodec-dev libavformat-dev libavutil-dev libavfilter-dev libavdevice-dev
        if: runner.os == 'linux'
      - name: install livekit deps (linux)
        run: sudo apt update -y; sudo apt install -y libssl-dev libx11-dev libgl1-mesa-dev libxext-dev
        if: runner.os == 'linux'
      - name: install ffmpeg deps (macOs)
        if: runner.os == 'macos'
        run: |
          brew install ffmpeg@6 pkg-config;
          echo "PKG_CONFIG_PATH=/opt/homebrew/opt/ffmpeg@6/lib/pkgconfig" >> "$GITHUB_ENV"
      - name: install ffmpeg deps (windows)
        if: runner.os == 'windows' && matrix.os != 'self-hosted-windows'
        run: |
          # Prefer the standalone LLVM install (stable across runner image rolls); fall back to the VS-bundled Clang toolset, whose version moves with the image and has produced opaque bindgen structs on rollover.
          $vsLlvm = "$(& "${env:ProgramFiles(x86)}\Microsoft Visual Studio\Installer\vswhere.exe" -latest -property installationPath)\VC\Tools\LLVM\x64\bin"
          $libclang = @("C:\Program Files\LLVM\bin", $vsLlvm) | Where-Object { Test-Path "$_\libclang.dll" } | Select-Object -First 1
          if (-not $libclang) { throw "libclang.dll not found (checked standalone LLVM and VS Clang toolset)" }
          Write-Host "Using LIBCLANG_PATH=$libclang"
          Add-Content $env:GITHUB_ENV "LIBCLANG_PATH=$libclang`n"
          $ffUrl = "https://github.com/GyanD/codexffmpeg/releases/download/6.0/ffmpeg-6.0-full_build-shared.7z"
          for ($i = 1; $i -le 3; $i++) {
            try { Invoke-WebRequest $ffUrl -OutFile ffmpeg-6.0-full_build-shared.7z; break }
            catch { if ($i -eq 3) { throw }; Write-Host "ffmpeg download failed (attempt $i), retrying..."; Start-Sleep -Seconds 5 }
          }
          7z x ffmpeg-6.0-full_build-shared.7z
          mkdir ffmpeg
          mv ffmpeg-*/* ffmpeg/
          if (-not (Test-Path "ffmpeg\include")) { throw "ffmpeg headers missing after extract (ffmpeg\include not found)" }
          Add-Content $env:GITHUB_ENV "FFMPEG_DIR=${pwd}\ffmpeg`n"
          Add-Content $env:GITHUB_PATH "${pwd}\ffmpeg\bin`n"
      - name: Install ninja (macos)
        if: runner.os == 'macos'
        run: brew install ninja
      # windows runner images ship ninja + cmake already.
      # react-hud-cef (default feature): test executables link libcef on linux/windows — export
      # the distribution and put it on the loader path.
      - name: Export CEF distribution
        shell: bash
        run: |
          cargo install export-cef-dir --version "139.8.0+139.0.40"
          export-cef-dir --force "$HOME/.local/share/cef"
          # GITHUB_ENV/GITHUB_PATH reach native processes verbatim: on windows the git-bash
          # $HOME (/c/Users/...) would resolve as C:\c\Users\... — write windows paths there.
          if [ "$RUNNER_OS" = "Windows" ]; then
            echo "CEF_PATH=$(cygpath -w "$HOME/.local/share/cef")" >> "$GITHUB_ENV"
            cygpath -w "$HOME/.local/share/cef" >> "$GITHUB_PATH"
          else
            echo "CEF_PATH=$HOME/.local/share/cef" >> "$GITHUB_ENV"
          fi
          if [ "$RUNNER_OS" = "Linux" ]; then echo "LD_LIBRARY_PATH=$HOME/.local/share/cef:$LD_LIBRARY_PATH" >> "$GITHUB_ENV"; fi
      - name: Build Release
        uses: actions-rs/cargo@v1
        with:
          command: build
          args: --package dcl_deno_ipc --release --locked
      - uses: actions-rs/cargo@v1
        if: runner.os == 'windows'
        with:
          command: test
          args: --all --release --locked -j8 -- --test-threads=1 
      - uses: actions-rs/cargo@v1
        if: runner.os == 'linux'
        with:
          command: test
          args: --all --release --locked -- --test-threads=1 
      - uses: actions-rs/cargo@v1
        if: runner.os == 'macos'
        with:
          command: test
          args: --all --release --locked -- --test-threads=1 
      
  fmt:
    name: Rustfmt
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions-rs/toolchain@v1
        with:
          profile: minimal
          toolchain: stable
          override: true
      - run: rustup component add rustfmt
      - uses: actions-rs/cargo@v1
        with:
          command: fmt
          args: --all -- --check

  clippy:
    name: Clippy
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions-rs/toolchain@v1
        with:
          profile: minimal
          toolchain: stable
          override: true
      - run: rustup component add clippy
      - uses: Swatinem/rust-cache@v2
        with:
          save-if: ${{ github.ref == 'refs/heads/main' }}
      - name: Install protoc
        uses: arduino/setup-protoc@3ea1d70ac22caff0b66ed6cb37d5b7aadebd4623 # @master
        with:
          repo-token: ${{ secrets.GITHUB_TOKEN }}
      - name: Install alsa and udev
        run: sudo apt-get update; sudo apt-get install --no-install-recommends libasound2-dev libudev-dev ninja-build
      - name: install ffmpeg deps (linux)
        run: sudo apt install -y --no-install-recommends clang curl pkg-config libavcodec-dev libavformat-dev libavutil-dev libavfilter-dev libavdevice-dev
      - uses: actions-rs/cargo@v1
        with:
          command: clippy
          args: --locked -- -D warnings

  toml:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false
      - name: Install taplo
        run: curl -fsSL https://github.com/tamasfe/taplo/releases/download/0.10.0/taplo-linux-x86_64.gz | gzip -d - | install -m 755 /dev/stdin /usr/local/bin/taplo
      - name: Run Taplo
        id: taplo
        run: taplo fmt --check --diff
      - name: Taplo info
        if: failure()
        run: |
          echo 'To fix toml fmt, please run `taplo fmt`.'
          echo 'To check for a diff, run `taplo fmt --check --diff`.'
          echo 'You can find taplo here: https://taplo.tamasfe.dev/'
          echo 'Or if you use VSCode, use the `Even Better Toml` extension.'
          echo 'You can find the extension here: https://marketplace.visualstudio.com/items?itemName=tamasfe.even-better-toml'

  build-deploy-web:
    name: Build and Deploy Web
    # Not gated off dependabot: this is the only job that builds the npm trees
    # (react-web, bridge-scene, deploy/web), so npm bumps need it to merge safely.
    # needs: [test, fmt, clippy]
    runs-on: ubuntu-latest
    # Serialize deploys per ref so two main pushes can't publish concurrently.
    concurrency:
      group: ${{ github.workflow }}-deploy-web-${{ github.ref }}

    permissions:
      id-token: write
      contents: read

    steps:
      - uses: actions/checkout@v6
      - name: Use Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 24
          registry-url: 'https://registry.npmjs.org'
      - name: Set package.json version
        uses: decentraland/oddish-action@0074f2d535c43b5c83f136525304a6277166d77f # @master
        with:
          cwd: './deploy/web'
          deterministic-snapshot: true
          only-update-versions: true
      - uses: actions-rs/toolchain@v1
        with:
          toolchain: nightly-2026-04-15
          target: wasm32-unknown-unknown
          components: rust-src
          override: true
      # Save only from main so PR runs restore main's cache instead of writing
      # per-PR copies that thrash the repo's 10GB cache quota.
      - uses: Swatinem/rust-cache@v2
        with:
          shared-key: wasm-web
          save-if: ${{ github.ref == 'refs/heads/main' }}
      - name: Install protoc
        uses: arduino/setup-protoc@3ea1d70ac22caff0b66ed6cb37d5b7aadebd4623 # @master
        with:
          repo-token: ${{ secrets.GITHUB_TOKEN }}
      - name: Install wasm-pack
        run: |
          curl -fsSL https://github.com/rustwasm/wasm-pack/releases/download/v0.15.0/wasm-pack-v0.15.0-x86_64-unknown-linux-musl.tar.gz \
            | tar -xz --strip-components=1 -C "$HOME/.cargo/bin" wasm-pack-v0.15.0-x86_64-unknown-linux-musl/wasm-pack
      # alsa/udev ARE still needed despite targeting wasm32: the build compiles a HOST-side
      # graph too (build scripts + their deps, x86_64), and that graph links libudev via
      # pkg-config — dropping them fails `libudev-sys` before wasm-pack even reaches the
      # wasm target.
      - name: Install alsa and udev
        run: sudo apt-get update; sudo apt-get install --no-install-recommends libasound2-dev libudev-dev
      - name: install deps (linux)
        run: sudo apt install -y --no-install-recommends clang
      # wasm-opt costs ~9 min and only matters for the published binary — PRs
      # never publish (see the Publish step's if), so they skip it.
      - name: Build WASM package
        env:
          WASM_OPT_FLAG: ${{ github.event_name == 'pull_request' && '--no-opt' || '' }}
        run: |
          wasm-pack build --target web $WASM_OPT_FLAG --out-dir ./deploy/web/engine/pkg --no-default-features --features="livekit,social"
          rm -f ./deploy/web/engine/pkg/.gitignore
          WASM_SIZE=$(wc -c < ./deploy/web/engine/pkg/webgpu_build_bg.wasm)
          echo "{\"wasmSize\":${WASM_SIZE}}" > ./deploy/web/engine/pkg/manifest.json
      - name: Install
        run: npm i
        working-directory: deploy/web
      # The React HUD is the production page: build it into deploy/web root (vite outDir).
      # PUBLIC_URL = the versioned CDN base prebuild.js just wrote into package.json homepage —
      # index.html asset refs must be ABSOLUTE because the entry URL (decentraland.zone/bevy-web)
      # has no trailing slash, so relative refs would resolve against the origin root.
      - name: Build react-web HUD
        run: |
          export PUBLIC_URL=$(node -p "require('./deploy/web/package.json').homepage || ''")
          echo "PUBLIC_URL=$PUBLIC_URL"
          npm ci --prefix react-web
          npm run build --prefix react-web
      # The headless bridge scene the engine loads as its --ui systemScene. The realm (about) is
      # served same-origin with the engine iframe, but the scene CONTENT baseUrl is baked at
      # export — point it at the versioned CDN path so it's version-pinned + immutable and never
      # depends on where the site tree is mounted (the entry lives under /bevy-web, not /).
      - name: Bundle bridge scene
        run: |
          export SCENE_BASE_URL="$(node -p "require('../../deploy/web/package.json').homepage || ''")/bridge-scene/static/"
          echo "SCENE_BASE_URL=$SCENE_BASE_URL"
          npm ci
          npm run bundle
        working-directory: react-web/bridge-scene
      - name: Publish
        if: (github.event_name == 'push' && github.ref == 'refs/heads/main') || github.event_name == 'release'
        uses: decentraland/oddish-action@0074f2d535c43b5c83f136525304a6277166d77f # @master
        with:
          cwd: './deploy/web'
          deterministic-snapshot: true
          registry-url: 'https://registry.npmjs.org'
          access: public
          gitlab-token: ${{ secrets.GITLAB_CDN_DEPLOYER_TOKEN }}
          gitlab-pipeline-url: ${{ secrets.GITLAB_CDN_DEPLOYER_URL }}
