name: Build Release

on:
    workflow_dispatch:

jobs:
    create-release:
        name: Create Release
        runs-on: ubuntu-22.04
        outputs:
            package_prefix: bevy-explorer-${{ steps.current_time_underscores.outputs.formattedTime }}
            tag_name: alpha-${{ steps.current_time_dashes.outputs.formattedTime }}
        if: github.repository == 'decentraland/bevy-explorer' || github.event_name == 'workflow_dispatch'
        steps:
          - name: Clone repo
            uses: actions/checkout@v3

          - name: Get current time with underscores
            uses: 1466587594/get-current-time@5979d2f4455ed5df566aa6df67cedd77d17afaa9 # v2.1.1, pinned for supply-chain safety
            id: current_time_underscores
            with:
                format: YYYY-MM-DD-HH-mm-ss

          - name: Get current time with dashes
            uses: 1466587594/get-current-time@5979d2f4455ed5df566aa6df67cedd77d17afaa9 # v2.1.1, pinned for supply-chain safety
            id: current_time_dashes
            with:
                format: YYYY-MM-DD-HH-mm-ss
    
          - name: Create release
            id: create_release
            run: |
                tag_name="alpha-${{ steps.current_time_dashes.outputs.formattedTime }}"
                release_name="Release ${{ steps.current_time_dashes.outputs.formattedTime }}"
                gh release create "$tag_name" --title "$release_name" --generate-notes --prerelease
            env:
                GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

    build:
        name: Build ${{ matrix.build_name }}
        needs: create-release
        strategy:
            fail-fast: false
            matrix:
                include:
                  - build_name: linux-x86_64
                    os: ubuntu-latest

                  - build_name: macos-m1m2
                    os: macos-15

                  - build_name: windows-x86_64
                    os: windows-latest

        env:
            PACKAGE_FILE: ${{ needs.create-release.outputs.package_prefix }}-${{ matrix.build_name }}.${{ startsWith(matrix.build_name, 'lin') && 'tar.gz' || 'zip' }}
            APPIMAGE_FILE: ${{ needs.create-release.outputs.package_prefix }}-${{ matrix.build_name }}.AppImage
            CARGO_BUILD_DIR: target/release

        runs-on: ${{ matrix.os }}
        steps:
          - name: Clone repo
            uses: actions/checkout@v3

          - uses: actions-rs/toolchain@v1
            with:
                profile: minimal
                toolchain: stable
                override: true
          - name: add darwin target
            if: runner.os == 'macos'
            run: rustup target add aarch64-apple-darwin

          - name: Install protoc
            if: matrix.os != 'self-hosted-windows'
            uses: arduino/setup-protoc@3ea1d70ac22caff0b66ed6cb37d5b7aadebd4623 # @master
            with:
                repo-token: ${{ secrets.GITHUB_TOKEN }}
    
          # react HUD (cef): node for the page + bridge-scene bundles, ninja for cef-dll-sys' cmake build
          - uses: actions/setup-node@v4
            with:
                node-version: 20
          - name: Bundle react HUD (page + bridge scene -> assets/)
            run: |
                cd react-web && npm ci
                cd bridge-scene && npm ci && cd ..
                npm run bundle:native
            shell: bash
          - name: Install ninja (macos)
            if: runner.os == 'macos'
            run: brew install ninja
          - name: Install ninja (linux)
            if: runner.os == 'linux'
            run: sudo apt-get install -y --no-install-recommends ninja-build
          # CEF redistributables to ship next to the binaries (version must match the locked `cef` crate)
          - name: Export CEF distribution
            run: |
                cargo install export-cef-dir --version "139.8.0+139.0.40"
                export-cef-dir --force "$HOME/.local/share/cef"
                # GITHUB_ENV reaches native processes verbatim: on windows the git-bash $HOME
                # (/c/Users/...) would resolve as C:\c\Users\... — write a windows path there.
                if [ "$RUNNER_OS" = "Windows" ]; then
                  echo "CEF_PATH=$(cygpath -w "$HOME/.local/share/cef")" >> "$GITHUB_ENV"
                else
                  echo "CEF_PATH=$HOME/.local/share/cef" >> "$GITHUB_ENV"
                fi
            shell: bash

          - name: Install alsa and udev
            if: runner.os == 'linux'
            run: sudo apt-get update; sudo apt-get install --no-install-recommends libasound2-dev libudev-dev
          - name: install livekit deps
            if: runner.os == 'linux'
            run: sudo apt update -y; sudo apt install -y libssl-dev libx11-dev libgl1-mesa-dev libxext-dev fuse libfuse2t64
          - name: install ffmpeg deps (linux)
            run: sudo apt install -y --no-install-recommends clang curl pkg-config libavcodec-dev libavformat-dev libavutil-dev libavfilter-dev libavdevice-dev
            if: runner.os == 'linux'
          - name: install ffmpeg deps (macOs)
            if: runner.os == 'macos'
            run: |
              brew install ffmpeg@6 pkg-config;
              echo "PKG_CONFIG_PATH=/opt/homebrew/opt/ffmpeg@6/lib/pkgconfig" >> "$GITHUB_ENV"
          - name: install ffmpeg deps (windows)
            if: runner.os == 'windows' && matrix.os != 'self-hosted-windows'
            run: |
              # Prefer the standalone LLVM install (stable across runner image rolls); fall back to the VS-bundled Clang toolset, whose version moves with the image and has produced opaque bindgen structs on rollover.
              $vsLlvm = "$(& "${env:ProgramFiles(x86)}\Microsoft Visual Studio\Installer\vswhere.exe" -latest -property installationPath)\VC\Tools\LLVM\x64\bin"
              $libclang = @("C:\Program Files\LLVM\bin", $vsLlvm) | Where-Object { Test-Path "$_\libclang.dll" } | Select-Object -First 1
              if (-not $libclang) { throw "libclang.dll not found (checked standalone LLVM and VS Clang toolset)" }
              Write-Host "Using LIBCLANG_PATH=$libclang"
              Add-Content $env:GITHUB_ENV "LIBCLANG_PATH=$libclang`n"
              $ffUrl = "https://github.com/GyanD/codexffmpeg/releases/download/6.0/ffmpeg-6.0-full_build-shared.7z"
              for ($i = 1; $i -le 3; $i++) {
                try { Invoke-WebRequest $ffUrl -OutFile ffmpeg-6.0-full_build-shared.7z; break }
                catch { if ($i -eq 3) { throw }; Write-Host "ffmpeg download failed (attempt $i), retrying..."; Start-Sleep -Seconds 5 }
              }
              7z x ffmpeg-6.0-full_build-shared.7z
              mkdir ffmpeg
              mv ffmpeg-*/* ffmpeg/
              if (-not (Test-Path "ffmpeg\include")) { throw "ffmpeg headers missing after extract (ffmpeg\include not found)" }
              Add-Content $env:GITHUB_ENV "FFMPEG_DIR=${pwd}\ffmpeg`n"
              Add-Content $env:GITHUB_PATH "${pwd}\ffmpeg\bin`n"          
          - name: install ffmpeg deps (windows)
            if: runner.os == 'windows' && matrix.os == 'self-hosted-windows'
            run: |
              Add-Content $env:GITHUB_ENV "FFMPEG_DIR=c:\ffmpeg-6.0`n"
    
              
          # CEF_PATH comes from the Export CEF distribution step via GITHUB_ENV
          - name: Cargo build (windows)
            if: runner.os == 'windows'
            run: cargo build --release --locked --package dcl_deno_ipc -j8 && cargo build --release --locked -j8
          - name: Cargo build (macos)
            if: runner.os == 'macos'
            run: cargo build --release --locked --package dcl_deno_ipc && cargo build --release --locked
          - name: Cargo build (linux)
            if: runner.os == 'linux'
            run: cargo build --release --locked --package dcl_deno_ipc && cargo build --release --locked

          - name: Package common
            run: |
                mkdir package
                cp readme.md package/README.md
                cp LICENSE package/LICENSE
          
          - name: (macos) Preparing binary and librarys
            if: runner.os == 'macos'
            run: |
              brew install dylibbundler
              mv ${{ env.CARGO_BUILD_DIR }}/decentra-bevy .
              dylibbundler -cd -b -x decentra-bevy -d ./libs     

          - name: Package Macos
            if: runner.os == 'macos'
            env:
              MACOS_CSC_CONTENT: ${{ secrets.MACOS_CSC_CONTENT }}
              MACOS_CSC_KEY_PASSWORD: ${{ secrets.MACOS_CSC_KEY_PASSWORD }}
              MACOS_DEVELOPER_ID: ${{ secrets.MACOS_DEVELOPER_ID }}
              MACOS_NOTARIZATION_APPLE_ID: ${{ secrets.MACOS_NOTARIZATION_APPLE_ID }}
              MACOS_NOTARIZATION_PWD: ${{ secrets.MACOS_NOTARIZATION_PWD }}
              MACOS_NOTARIZATION_TEAM_ID: ${{ secrets.MACOS_NOTARIZATION_TEAM_ID }}
              GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
            run: |
              cd deploy/macos
              bash build.sh
              mv DecentralandBevyExplorer.zip ../../${{ env.PACKAGE_FILE }}

          - name: Package Windows
            if: runner.os == 'Windows'
            continue-on-error: true
            run: |
                cp ${{ env.CARGO_BUILD_DIR }}/decentra-bevy.exe package/decentra-bevy.exe
                cp ${{ env.CARGO_BUILD_DIR }}/dcl_deno_ipc.exe package/dcl_deno_ipc.exe
                cp ${{ env.CARGO_BUILD_DIR }}/decentra-bevy-cef.exe package/decentra-bevy-cef.exe
                cp -r assets package/assets
                # CEF runtime next to the exe (standard layout). export-cef-dir FLATTENS the
                # distribution: dlls, snapshots, paks and locales all live at the root of the
                # export dir — there is no Release/ or Resources/ subdir.
                $cef = "$env:USERPROFILE\.local\share\cef"
                cp "$cef\*.dll" package/
                cp "$cef\*.bin" package/
                cp "$cef\*.pak" package/
                cp "$cef\*.dat" package/
                cp "$cef\*.json" package/
                cp -r "$cef\locales" package/locales
                cp ${{ env.FFMPEG_DIR }}/bin/*.dll package
                7z a ${{ env.PACKAGE_FILE }} ./package/*

          - name: Package Linux
            if: runner.os == 'linux'
            continue-on-error: true
            run: |
                cp ${{ env.CARGO_BUILD_DIR }}/decentra-bevy package/decentra-bevy
                cp ${{ env.CARGO_BUILD_DIR }}/dcl_deno_ipc package/dcl_deno_ipc
                cp ${{ env.CARGO_BUILD_DIR }}/decentra-bevy-cef package/decentra-bevy-cef
                cp -r assets package/assets
                # CEF runtime next to the exe (standard layout). export-cef-dir FLATTENS the
                # distribution: .so, snapshots, paks and locales all live at the root of the
                # export dir — there is no Release/ or Resources/ subdir.
                # NOTE (best-effort): unless cef-dll-sys sets an $ORIGIN rpath, linux users may
                # need LD_LIBRARY_PATH=. to launch; AppImage packaging of CEF is not attempted.
                cef="$HOME/.local/share/cef"
                cp "$cef"/*.so* "$cef"/*.bin "$cef"/*.pak "$cef"/*.dat "$cef"/*.json package/
                cp -r "$cef/locales" package/locales
                if [ -f "$cef/chrome-sandbox" ]; then cp "$cef/chrome-sandbox" package/; fi
                # We must enter the package/ directory in order to create a flat tarball (i.e. without a directory in it).
                cd package
                tar -czvf ../${{ env.PACKAGE_FILE }} *            

          - name: Package AppImage
            if: runner.os == 'linux'
            continue-on-error: true
            run: |
              cd deploy/linux
              mkdir BevyExplorer.AppDir/usr
              mkdir BevyExplorer.AppDir/usr/bin
              cp ../../target/release/decentra-bevy BevyExplorer.AppDir/usr/bin
              cp ../../target/release/dcl_deno_ipc BevyExplorer.AppDir/usr/bin
              wget https://github.com/linuxdeploy/linuxdeploy/releases/download/1-alpha-20251107-1/linuxdeploy-x86_64.AppImage
              wget https://github.com/AppImage/appimagetool/releases/latest/download/appimagetool-x86_64.AppImage
              chmod +x ./linuxdeploy-x86_64.AppImage ./appimagetool-x86_64.AppImage
              export PATH="$(pwd):$PATH"
              export APPIMAGETOOL="$(pwd)/appimagetool.AppImage"
              ./linuxdeploy-x86_64.AppImage --appdir BevyExplorer.AppDir --output appimage --create-desktop-file \
                --executable=../../target/release/decentra-bevy \
                --executable=../../target/release/dcl_deno_ipc \
                --icon-file=decentra-bevy.png
              mv ./decentra-bevy-x86_64.AppImage ${{ env.APPIMAGE_FILE }}
              gh release upload "${{ needs.create-release.outputs.tag_name }}" ${{ env.APPIMAGE_FILE }}
            env:
                GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

          - name: Upload package
            continue-on-error: true
            run: gh release upload "${{ needs.create-release.outputs.tag_name }}" "${{ env.PACKAGE_FILE }}"
            env:
                GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
